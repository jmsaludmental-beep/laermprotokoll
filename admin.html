<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin · Lärmprotokoll Hamburg</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="favicon.png" />
  </head>
  <body>
    <main class="page admin-page">
      <header class="admin-header">
        <div>
          <h1>Admin-Login</h1>
        </div>
        <div>
          <button id="signOutBtn" class="secondary" type="button" style="display: none;">Abmelden</button>
        </div>
      </header>

      <section class="admin-login" id="loginSection">
        <div class="hero__panel">
          <form id="loginForm" class="form">
            <div class="form-group">
              <label for="adminEmail">E-Mail</label>
              <input type="email" id="adminEmail" name="email" required />
            </div>
            <div class="form-group">
              <label for="adminPassword">Passwort</label>
              <input type="password" id="adminPassword" name="password" required />
            </div>
            <button type="submit" class="primary">Anmelden</button>
            <p class="helper" id="loginStatus"></p>
          </form>
        </div>
      </section>

      <section class="admin-panel" id="panelSection" style="display: none;">
        <div class="board__header">
          <div>
            <h2>Alle Einträge</h2>
            <p>Listenansicht der Lärmberichte</p>
          </div>
          <div class="filters">
            <input id="adminSearch" type="search" placeholder="Suche..." />
          </div>
        </div>
        <div id="adminEntries" class="admin-list"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="utils.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
