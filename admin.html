<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin · Lärmprotokoll Hamburg</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="page admin-page">
      <header class="admin-header">
        <div>
          <p class="tag">Admin · Lärmprotokoll</p>
          <h1>Moderation & Übersicht</h1>
          <p class="subtitle">
            Hier kannst du Einträge prüfen und bei Bedarf ausblenden.
          </p>
        </div>
        <div>
          <button id="signOutBtn" class="secondary" type="button">Abmelden</button>
        </div>
      </header>

      <section class="admin-login" id="loginSection">
        <div class="hero__panel">
          <h2>Admin-Login</h2>
          <form id="loginForm" class="form">
            <label>
              E-Mail
              <input type="email" name="email" required />
            </label>
            <label>
              Passwort
              <input type="password" name="password" required />
            </label>
            <button type="submit" class="primary">Anmelden</button>
            <p class="helper" id="loginStatus"></p>
          </form>
        </div>
      </section>

      <section class="admin-panel" id="panelSection">
        <div class="board__header">
          <div>
            <h2>Alle Einträge</h2>
            <p>Hier siehst du auch ausgeblendete Inhalte.</p>
          </div>
          <div class="filters">
            <input id="adminSearch" type="search" placeholder="Suche nach Nachbar:in oder Beschreibung" />
          </div>
        </div>
        <div id="adminEntries" class="entries"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
  </body>
</html>
